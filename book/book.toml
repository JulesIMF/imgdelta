# image-delta — incremental disk-image compression toolkit
# mdBook configuration for the project documentation book

[book]
title = "imgdelta"
description = "Delta compression tool for cloud OS images"
language = "en"
src = "src"

[output.html]
site-url = "/imgdelta/"
git-repository-url = "https://github.com/JulesIMF/imgdelta"
edit-url-template = "https://github.com/JulesIMF/imgdelta/edit/main/book/src/{path}"
additional-js = ["js/mermaid.min.js", "js/mermaid-init.js"]
mathjax-support = true

[preprocessor.mermaid]
command = "mdbook-mermaid"
