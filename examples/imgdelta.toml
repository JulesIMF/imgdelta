# image-delta — incremental disk-image compression toolkit
# imgdelta runtime configuration (storage + encoder settings)

# Copy this file to imgdelta.toml and fill in your values.

# ── Logging ──────────────────────────────────────────────────────────────────

[logging]
level = "info"
# file = "/var/log/imgdelta/compress.log"   # optional: structured JSON log file

# Per-module overrides (tracing target syntax):
# [logging.targets]
# "image_delta_core::fs_diff" = "debug"
# "image_delta_core::compressor" = "debug"

# ── Storage ───────────────────────────────────────────────────────────────────

[storage]
type = "local"
local_dir = "/tmp/imgdelta-storage"

# ── Compressor ───────────────────────────────────────────────────────────────

[compressor]
workers = 4 # parallel encoding threads (rayon)

# Routing rules — first match wins.
# Encode pipeline decides which delta algorithm to use for each file.

[[compressor.routing]]
type = "glob"
pattern = "**/*.gz"
encoder = "passthrough" # already compressed — don't diff

[[compressor.routing]]
type = "glob"
pattern = "**/*.zst"
encoder = "passthrough"

[[compressor.routing]]
type = "glob"
pattern = "**/*.xz"
encoder = "passthrough"

[[compressor.routing]]
type = "glob"
pattern = "**/*.{png,jpg,jpeg,gif,webp,mp4,mkv,avi}"
encoder = "passthrough"

[[compressor.routing]]
type = "elf"
encoder = "xdelta3" # ELF binaries benefit most from binary diff

[[compressor.routing]]
type = "size"
max_bytes = 4096
encoder = "passthrough" # tiny files — delta overhead not worth it

[[compressor.routing]]
type = "magic"
hex = "89504e47"        # PNG magic
encoder = "passthrough"

# Fallback: xdelta3 for everything else
[[compressor.routing]]
type = "glob"
pattern = "**/*"
encoder = "xdelta3"
