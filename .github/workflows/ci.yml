name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install C compiler (for vendored xdelta3.c)
        run: sudo apt-get install -y gcc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: License headers
        run: |
          find . -type f \( -name "*.rs" -o -name "*.toml" -o -name "*.sh" \
               -o -name "*.sql" -o -name ".env*" \) \
               ! -path "./target/*" \
               ! -path "./.git/*" \
               -print0 \
          | xargs -0 bash scripts/check-license-header.sh

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all
